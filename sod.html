<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; color: #e0e0e0; font-family: Arial, sans-serif; min-height: 100vh; transition: background 0.3s, color 0.3s; }
body.light { background: #f0ebe0; color: #2a1f0e; }

.hub-header { background: #16213e; border-bottom: 2px solid #e8a020; padding: 20px 40px; display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; transition: background 0.3s, border-color 0.3s; }
body.light .hub-header { background: #e8dcc8; border-bottom-color: #b89060; }

.guild-name { font-size: 13px; font-weight: 700; color: #cc2222; letter-spacing: 1px; margin-bottom: 2px; }
.hub-icon { width: 48px; height: 48px; border-radius: 12px; border: 1px solid #4a2a7a; background: #1a0d2b; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
body.light .hub-icon { background: #ddd0b8; border-color: #b89060; }
.hub-title { font-size: 20px; font-weight: 700; color: #e8a020; }

.hub-sub { font-size: 12px; color: #888; margin-top: 3px; }

.back-btn { display: inline-flex; align-items: center; gap: 6px; margin: 16px auto; font-size: 13px; color: #e8a020; text-decoration: none; border: 1px solid #2a2a4a; background: #16213e; padding: 6px 14px; border-radius: 6px; transition: border-color 0.15s, background 0.3s, color 0.3s; }

body.light .back-btn { background: #e0d4bc; border-color: #c0a878; color: #8a5a10; }
body.light .back-btn:hover { border-color: #8a5a10; }
.back-wrap { text-align: center; padding: 0 40px; }

.section-label { padding: 10px 40px 12px; font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
body.light .section-label { color: #9a7040; }

.tool-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 18px; padding: 12px 40px 50px; }
.card-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 220px; }

.tool-card { width: 100%; height: 240px; background: #16213e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 22px 16px; text-align: center; text-decoration: none; display: flex; flex-direction: column; align-items: center; transition: border-color 0.15s, background 0.15s; }
.tool-card:hover { border-color: #e8a020; background: #1e2a4a; }
.tool-card:hover .tool-icon { border-color: #e8a020; }
.tool-card:hover .card-arrow { opacity: 1; }
body.light .tool-card { background: #e8dcc8; border-color: #c0a878; }
body.light .tool-card:hover { background: #f4e8d0; border-color: #8a5a10; }

.tool-icon { width: 56px; height: 56px; border-radius: 14px; border: 1px solid #2a2a4a; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s; }
body.light .tool-icon { border-color: #b09060; }

.tool-title { font-size: 13px; font-weight: 700; color: #e0e0e0; margin-bottom: 5px; line-height: 1.3; }
body.light .tool-title { color: #2a1a08; }
.tool-desc { font-size: 11px; color: #666; line-height: 1.6; }
body.light .tool-desc { color: #7a6040; }
.card-arrow { font-size: 16px; color: #e8a020; margin-top: auto; padding-top: 12px; opacity: 0; transition: opacity 0.15s; }
body.light .card-arrow { color: #8a5a10; }

.tag-live { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 3px; font-weight: 700; margin-top: 8px; background: #0d2b1a; color: #4ecb71; border: 1px solid #1a5a30; }
body.light .tag-live { background: #d0f0d8; color: #1a6030; border-color: #60b878; }

.dl-slot { display: flex; align-items: center; justify-content: center; height: 28px; }
.dl-btn { display: inline-flex; align-items: center; justify-content: center; gap: 4px; font-size: 10px; color: #5ba4f5; border: 1px solid #1a4a7a; background: #0a1a30; padding: 3px 12px; border-radius: 3px; text-decoration: none; letter-spacing: 0.3px; transition: border-color 0.15s, color 0.15s, background 0.3s; }
.dl-btn:hover { border-color: #5ba4f5; color: #85c4f5; background: #0d2240; }
body.light .dl-btn { background: #d0e4f8; color: #1a4a8a; border-color: #6090c8; }
