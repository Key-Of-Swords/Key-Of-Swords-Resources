<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secrets of Faydwer — Progression Checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 16px; font-size: 13px; }
  h1 { text-align: center; color: #f0c060; font-size: 20px; margin-bottom: 4px; letter-spacing: 1px; text-shadow: 0 0 10px rgba(240,192,96,0.3); }
  .subtitle { text-align: center; color: #888; font-size: 11px; margin-bottom: 14px; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 14px; background: #16213e; border: 1px solid #2a2a4a; border-radius: 6px; padding: 8px 16px; }
  .legend-item { font-size: 12px; color: #aaa; }
  #saveBar { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  #saveStatus { font-size: 11px; padding: 3px 10px; border-radius: 4px; background: #1e3a1e; color: #6fcf6f; border: 1px solid #2e6a2e; min-width: 180px; text-align: center; }
  #saveStatus.warn { background: #3a2a00; color: #f0c060; border-color: #806020; }
  .save-btn { background: #0f3460; border: 1px solid #1a5aaa; color: #7ecfff; padding: 4px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .save-btn:hover { background: #1a4a80; }
  .overall-section { background: #16213e; border: 1px solid #2a3a5a; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; text-align: center; }
  .overall-section h2 { color: #f0c060; font-size: 13px; margin-bottom: 10px; letter-spacing: 0.5px; }
  .controls { display: flex; gap: 8px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap; }
  .controls button { background: #2a2a4a; border: 1px solid #444; color: #ccc; padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .controls button:hover { background: #3a3a6a; color: #fff; }
  .controls button.danger { border-color: #7a2020; color: #f08080; }
  .controls button.danger:hover { background: #4a1010; color: #ffaaaa; }
  .progress-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .prog-card { background: #0f1a38; border: 1px solid #2a2a4a; border-radius: 6px; padding: 7px 12px; min-width: 125px; text-align: center; cursor: pointer; }
  .prog-card:hover { border-color: #7ecfff; }
  .prog-card .char-name { color: #7ecfff; font-size: 12px; font-weight: 600; margin-bottom: 1px; display: flex; align-items: center; justify-content: center; gap: 4px; }
  .prog-card .group-label { color: #6090b0; font-size: 10px; font-style: italic; margin-bottom: 4px; min-height: 13px; }
  .prog-bar-bg { background: #2a2a4a; border-radius: 4px; height: 7px; overflow: hidden; margin-bottom: 3px; }
  .prog-bar-fill { height: 100%; border-radius: 4px; background: #4CAF50; transition: width 0.3s; }
  .prog-text { color: #aaa; font-size: 10px; }
  .sect-wrap { margin-bottom: 14px; border: 1px solid #2a3a5a; border-radius: 8px; overflow: hidden; }
  .sect-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #16213e; cursor: pointer; user-select: none; border-bottom: 1px solid #2a3a5a; }
  .sect-header:hover { background: #1c2a4a; }
  .sect-title { color: #f0c060; font-size: 13px; font-weight: 600; letter-spacing: 0.5px; }
  .sect-zone { color: #6090b0; font-size: 10px; font-style: italic; margin-top: 2px; }
  .sect-toggle { color: #f0c060; font-size: 16px; transition: transform 0.2s; }
  .sect-toggle.collapsed { transform: rotate(-90deg); }
  .sect-prog-row { background: #12192e; padding: 8px 14px; border-bottom: 1px solid #1a2a3a; text-align: center; }
  .sect-prog-label { color: #888; font-size: 10px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .sect-prog-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .sect-prog-card { min-width: 110px; text-align: center; }
  .sect-prog-card .spc-name { color: #7ecfff; font-size: 10px; margin-bottom: 2px; }
  .sect-prog-card .prog-bar-bg { height: 5px; margin-bottom: 2px; }
  .sect-prog-card .prog-text { font-size: 9px; }
  .sect-body { background: #131928; }
  .col-header-row { display: flex; align-items: center; padding: 4px 14px; background: #0f1828; border-bottom: 1px solid #1a2535; position: sticky; top: 0; z-index: 5; }
  .col-header-spacer { flex: 1; }
  .col-headers { display: flex; gap: 12px; }
  .col-hdr { width: 74px; min-width: 74px; text-align: center; font-size: 10px; color: #7ecfff; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sub-header { background: #141e32; color: #88aacc; font-size: 11px; font-style: italic; padding: 5px 20px; border-bottom: 1px solid #1a2030; }
  .task-row { display: flex; align-items: flex-start; padding: 5px 14px; border-bottom: 1px solid #1a1f2e; gap: 6px; }
  .task-row:hover { background: #1a2035; }
  .task-row.all-done .task-text { color: #556; text-decoration: line-through; }
  .task-icon { min-width: 22px; font-size: 13px; padding-top: 1px; }
  .task-text { flex: 1; color: #ccc; line-height: 1.4; font-size: 12px; }
  .task-text a { color: #7ecfff; text-decoration: none; border-bottom: 1px dotted #3a6a9a; }
  .task-text a:hover { color: #f0c060; border-color: #f0c060; }
  .task-text .note { color: #778; font-size: 11px; font-style: italic; }
  .task-text .note.key { color: #8a9a6a; }
  .checkboxes { display: flex; gap: 12px; align-items: center; padding-top: 1px; }
  .chk-wrap { display: flex; flex-direction: column; align-items: center; gap: 1px; width: 74px; min-width: 74px; }
  .chk-wrap input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: #4CAF50; }
  .chk-wrap.done { background: rgba(76,175,80,0.08); border-radius: 3px; padding: 1px 3px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: #1e2a50; border: 1px solid #3a5a9a; border-radius: 10px; padding: 24px 28px; min-width: 300px; max-width: 420px; width: 90%; }
  .modal-box h2 { color: #f0c060; font-size: 15px; margin-bottom: 16px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; color: #aaa; font-size: 11px; margin-bottom: 4px; }

let groupNames = ['','','','','',''];
let checks     = {};
let sectOpen   = SECTIONS.map(()=>true);
let hideDone   = false;
let editingCI  = -1;

function saveToStorage() {
  try { localStorage.setItem(SAVE_KEY,JSON.stringify({checks,charNames,groupNames,sectOpen})); setStatus('✓ Saved — '+new Date().toLocaleTimeString(),false); }
  catch(e) { setStatus('⚠ localStorage unavailable — use Export to save',true); }
}
function loadFromStorage() {
  try {
    const s=localStorage.getItem(SAVE_KEY);
    if(s){ const o=JSON.parse(s); if(o.checks) checks=o.checks; if(o.charNames) charNames=o.charNames; if(o.groupNames) groupNames=o.groupNames; if(o.sectOpen) sectOpen=o.sectOpen; setStatus('✓ Loaded from browser storage',false); }
    else { setStatus('✓ Auto-save active',false); }
  } catch(e){ setStatus('⚠ localStorage unavailable',true); }
}
function setStatus(msg,warn){ const el=document.getElementById('saveStatus'); el.textContent=msg; el.className=warn?'warn':''; }
function serialize(){ return JSON.stringify({checks,charNames,groupNames,sectOpen}); }
function deserialize(s){ try{ const o=JSON.parse(s); if(o.checks) checks=o.checks; if(o.charNames) charNames=o.charNames; if(o.groupNames) groupNames=o.groupNames; if(o.sectOpen) sectOpen=o.sectOpen; return true; }catch(e){ return false; } }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function lnk(id,text){ return id?`<a href="${ALLA}${id}" target="_blank" rel="noopener">${esc(text)}</a>`:esc(text); }

function build(){ buildOverall(); buildSections(); }

function buildOverall(){
  const c=document.getElementById('overallProgress'); c.innerHTML='';
  for(let ci=0;ci<NUM_CHARS;ci++){
    let done=0; for(let i=0;i<TOTAL;i++) if(checks[`${i}-${ci}`]) done++;
    const pct=Math.round(done/TOTAL*100);
    const card=document.createElement('div'); card.className='prog-card'; card.title='Click to edit'; card.onclick=()=>openEditModal(ci);
    card.innerHTML=`<div class="char-name">${esc(charNames[ci])} <span style="font-size:10px;opacity:.5">✎</span></div><div class="group-label">${esc(groupNames[ci])||'&nbsp;'}</div><div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%"></div></div><div class="prog-text">${done} / ${TOTAL} (${pct}%)</div>`;
    c.appendChild(card);
  }
}

function buildSections(){
  const container=document.getElementById('sectContainer'); container.innerHTML='';
  SECTIONS.forEach((sect,si)=>{
    const sectItems=ITEMS.filter(it=>it.s===si);
    const wrap=document.createElement('div'); wrap.className='sect-wrap'; wrap.id='sect-'+si;
    const hdr=document.createElement('div'); hdr.className='sect-header'; hdr.onclick=()=>toggleSect(si);
    hdr.innerHTML=`<div><div class="sect-title">${sect.icon} ${esc(sect.label)}</div><div class="sect-zone">${esc(sect.zone)}</div></div><span class="sect-toggle${sectOpen[si]?'':' collapsed'}">▼</span>`;
    wrap.appendChild(hdr);
    const progRow=document.createElement('div'); progRow.className='sect-prog-row'; progRow.id='sect-prog-'+si; progRow.style.display=sectOpen[si]?'':'none';
    progRow.innerHTML=buildSectProgHTML(si,sectItems); wrap.appendChild(progRow);
    const body=document.createElement('div'); body.className='sect-body'; body.id='sect-body-'+si; body.style.display=sectOpen[si]?'':'none';
    const colHdr=document.createElement('div'); colHdr.className='col-header-row';
    colHdr.innerHTML=`<div class="col-header-spacer"></div><div class="col-headers">${charNames.map(n=>`<div class="col-hdr">${esc(n.substring(0,16))}</div>`).join('')}</div>`;
    body.appendChild(colHdr);
    let lastSub=null;
    sectItems.forEach(item=>{
      if(item.sub!==lastSub){
        if(item.sub){ const sh=document.createElement('div'); sh.className='sub-header'; sh.textContent=item.sub; body.appendChild(sh); }
        lastSub=item.sub;
      }
      const row=document.createElement('div'); row.className='task-row'; row.id='row-'+item.idx;
      if(charNames.every((_,ci)=>!!checks[`${item.idx}-${ci}`])) row.classList.add('all-done');
      const nc=item.isKey?'note key':'note';
      row.innerHTML=`<div class="task-icon">${item.icon}</div><div class="task-text">${item.link?lnk(item.link,item.text):esc(item.text)}${item.note?`<br><span class="${nc}">${esc(item.note)}</span>`:''}</div><div class="checkboxes" id="chk-${item.idx}"></div>`;
      body.appendChild(row);
      const chkC=row.querySelector(`#chk-${item.idx}`);
      charNames.forEach((_,ci)=>{
        const w=document.createElement('div'); w.className='chk-wrap'; if(checks[`${item.idx}-${ci}`]) w.classList.add('done');
        const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=!!checks[`${item.idx}-${ci}`];
        cb.addEventListener('change',function(){ checks[`${item.idx}-${ci}`]=this.checked; w.classList.toggle('done',this.checked); updateRowStyle(item.idx); buildOverall(); updateSectProgress(si,sectItems); saveToStorage(); if(hideDone) applyHideDone(); });
        w.appendChild(cb); chkC.appendChild(w);
      });
    });
    wrap.appendChild(body); container.appendChild(wrap);
  });
}

function buildSectProgHTML(si,sectItems){
  let html=`<div class="sect-prog-label">Section Progress</div><div class="sect-prog-grid" id="spg-${si}">`;
  for(let ci=0;ci<NUM_CHARS;ci++){
    let done=0; sectItems.forEach(it=>{ if(checks[`${it.idx}-${ci}`]) done++; });
    const total=sectItems.length,pct=total?Math.round(done/total*100):0;
    html+=`<div class="sect-prog-card"><div class="spc-name">${esc(charNames[ci].substring(0,16))}</div><div class="prog-bar-bg"><div class="prog-bar-fill" id="spf-${si}-${ci}" style="width:${pct}%"></div></div><div class="prog-text" id="spt-${si}-${ci}">${done}/${total} (${pct}%)</div></div>`;
  }
  return html+'</div>';
}
function updateSectProgress(si,sectItems){
  for(let ci=0;ci<NUM_CHARS;ci++){
    let done=0; sectItems.forEach(it=>{ if(checks[`${it.idx}-${ci}`]) done++; });
    const total=sectItems.length,pct=total?Math.round(done/total*100):0;
    const f=document.getElementById(`spf-${si}-${ci}`),t=document.getElementById(`spt-${si}-${ci}`);
    if(f) f.style.width=pct+'%'; if(t) t.textContent=`${done}/${total} (${pct}%)`;
  }
}
function updateRowStyle(idx){ const row=document.getElementById('row-'+idx); if(!row) return; row.classList.toggle('all-done',charNames.every((_,ci)=>!!checks[`${idx}-${ci}`])); }
function toggleSect(si){ sectOpen[si]=!sectOpen[si]; document.getElementById('sect-body-'+si).style.display=sectOpen[si]?'':'none'; document.getElementById('sect-prog-'+si).style.display=sectOpen[si]?'':'none'; document.querySelector(`#sect-${si} .sect-toggle`).classList.toggle('collapsed',!sectOpen[si]); saveToStorage(); }
function expandAll(){ SECTIONS.forEach((_,si)=>{ if(!sectOpen[si]) toggleSect(si); }); }
function collapseAll(){ SECTIONS.forEach((_,si)=>{ if(sectOpen[si]) toggleSect(si); }); }
function filterDone(){ hideDone=true; applyHideDone(); }
function applyHideDone(){ ITEMS.forEach(item=>{ const row=document.getElementById('row-'+item.idx); if(!row) return; row.style.display=(hideDone&&charNames.every((_,ci)=>!!checks[`${item.idx}-${ci}`]))?'none':''; }); }
function showAll(){ hideDone=false; ITEMS.forEach(item=>{ const r=document.getElementById('row-'+item.idx); if(r) r.style.display=''; }); }
function openResetConfirm(){ if(!confirm('Reset ALL checkboxes? Character names and group labels will be kept.\n\nThis cannot be undone.')) return; checks={}; saveToStorage(); build(); }
function openEditModal(ci){ editingCI=ci; document.getElementById('editCharName').value=charNames[ci]; document.getElementById('editGroupName').value=groupNames[ci]; document.getElementById('editModal').classList.add('open'); document.getElementById('editCharName').focus(); }
function closeEditModal(){ document.getElementById('editModal').classList.remove('open'); editingCI=-1; }
function saveEditModal(){ if(editingCI<0) return; charNames[editingCI]=document.getElementById('editCharName').value.trim()||DEFAULT_CHARS[editingCI]; groupNames[editingCI]=document.getElementById('editGroupName').value.trim(); closeEditModal(); saveToStorage(); build(); }
document.getElementById('editModal').addEventListener('click',e=>{ if(e.target===document.getElementById('editModal')) closeEditModal(); });
document.getElementById('editCharName').addEventListener('keydown',e=>{ if(e.key==='Enter') saveEditModal(); if(e.key==='Escape') closeEditModal(); });
document.getElementById('editGroupName').addEventListener('keydown',e=>{ if(e.key==='Enter') saveEditModal(); if(e.key==='Escape') closeEditModal(); });
function exportSave(){ document.getElementById('ioTitle').textContent='Export Save'; document.getElementById('ioHint').textContent='Copy this text and keep it safe. Use Import Save to restore progress.'; document.getElementById('ioCopyBtn').style.display='inline-block'; document.getElementById('ioImportBtn').style.display='none'; document.getElementById('ioTextarea').value=serialize(); document.getElementById('ioModal').classList.add('open'); }
function openImport(){ document.getElementById('ioTitle').textContent='Import Save'; document.getElementById('ioHint').textContent='Paste your previously exported save data below, then click Import.'; document.getElementById('ioCopyBtn').style.display='none'; document.getElementById('ioImportBtn').style.display='inline-block'; document.getElementById('ioTextarea').value=''; document.getElementById('ioModal').classList.add('open'); document.getElementById('ioTextarea').focus(); }
function closeIOModal(){ document.getElementById('ioModal').classList.remove('open'); }
function copyIO(){ const ta=document.getElementById('ioTextarea'); ta.select(); try{ navigator.clipboard.writeText(ta.value).catch(()=>document.execCommand('copy')); }catch(e){ document.execCommand('copy'); } document.getElementById('ioCopyBtn').textContent='Copied!'; setTimeout(()=>{ document.getElementById('ioCopyBtn').textContent='Copy to Clipboard'; },2000); }
function doImport(){ const val=document.getElementById('ioTextarea').value.trim(); if(!val) return; if(deserialize(val)){ closeIOModal(); saveToStorage(); build(); setStatus('✓ Import successful — '+new Date().toLocaleTimeString(),false); } else { alert('Import failed — save data appears invalid or corrupted.'); } }
document.getElementById('ioModal').addEventListener('click',e=>{ if(e.target===document.getElementById('ioModal')) closeIOModal(); });

loadFromStorage();
build();
</script>
</body>
</html>
